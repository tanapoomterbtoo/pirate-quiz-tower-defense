<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>Game Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Kanit:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <!-- Real game stylesheet — pixel-matched quiz UI -->
    <link rel="stylesheet" href="style.css?v=14">
    <style>
        /*
         * Preview canvas = exact game design size 1280×720.
         * Parent admin iframe scales this whole document.
         * Do NOT override #quiz-panel to display:block — game uses flex.
         */
        html {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 720px;
            font-size: 16px !important; /* same as resizeGame() at 1280 wide */
            overflow: hidden;
        }
        body {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 720px;
            min-height: 720px !important;
            max-height: 720px;
            overflow: hidden !important;
            display: block !important;
            background: #06070c;
        }
        #game-wrapper {
            width: 1280px !important;
            height: 720px !important;
            max-width: none !important;
            max-height: none !important;
            position: relative;
        }
        #game-container {
            width: 1280px !important;
            height: 720px !important;
            max-width: none !important;
            max-height: none !important;
            aspect-ratio: auto !important;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            overflow: hidden !important;
            position: relative;
        }
        /* Static backdrop under UI (replaces canvas) */
        .preview-world {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .preview-world .layer {
            position: absolute;
            inset: 0;
            background-size: 1280px 720px;
            background-position: center top;
            background-repeat: no-repeat;
        }
        .preview-world .layer-deck { top: 20px; }
        .preview-actor {
            position: absolute;
            bottom: 170px;
            width: 210px;
            height: 280px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
        }
        .preview-actor.player {
            left: 160px;
            background-image: url('../assets/images/characters/player/Player1/standard/idle/right/1.png');
        }
        .preview-actor.monster {
            right: 160px;
            background-image: url('../assets/images/characters/Monster_Set1/Easy/standard/idle/left/1.png');
        }
        .preview-hp {
            position: absolute;
            width: 150px;
            height: 16px;
            border: 2px solid #5a4b36;
            background: rgba(0,0,0,0.5);
            border-radius: 2px;
            overflow: hidden;
            z-index: 2;
        }
        .preview-hp > span { display: block; height: 100%; }
        .preview-hp.player-hp { left: 190px; bottom: 460px; }
        .preview-hp.player-hp > span { width: 100%; background: #4cd964; }
        .preview-hp.monster-hp { right: 190px; bottom: 460px; }
        .preview-hp.monster-hp > span { width: 80%; background: #ff3b30; }
        .preview-wave {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 18;
            color: #fff;
            font-family: var(--font-header);
            font-size: 28px;
            font-weight: 800;
            text-shadow: 0 2px 6px #000;
            white-space: nowrap;
            pointer-events: none;
        }
        #ui-overlay {
            z-index: 10 !important;
        }
        /* Keep real game flex layouts — only un-hide playing HUD */
        #top-hud {
            display: block !important;
            z-index: 16 !important;
        }
        #quiz-panel {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            z-index: 15 !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            /* Pin to design px (avoid vh relative to wrong viewport) */
            max-height: 480px !important;
            min-height: 280px !important;
            overflow-y: auto !important;
            background: linear-gradient(0deg, rgba(6, 7, 12, 0.98) 0%, rgba(6, 7, 12, 0.85) 70%, rgba(6, 7, 12, 0) 100%) !important;
        }
        #quiz-panel.has-long-choices {
            max-height: 560px !important;
            min-height: 320px !important;
        }
        #quiz-panel.split-layout {
            display: flex !important;
            flex-direction: row !important;
            align-items: stretch !important;
            height: auto !important;
            min-height: 320px !important;
            max-height: 500px !important;
        }
        #quiz-panel .quiz-box {
            flex-shrink: 0 !important;
        }
        #quiz-panel .choices-grid {
            flex-shrink: 0 !important;
            margin-top: 0.25rem;
        }
        /* Keep stem from eating the whole panel so ก–ง stay on screen */
        #question-text {
            max-height: 140px !important;
        }
        #top-hud.hidden { display: block !important; }
        #quiz-panel.hidden { display: flex !important; }
        /* Inventory must stay visible over the backdrop */
        #top-hud .inventory {
            z-index: 20 !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
        #top-hud .btn-item {
            display: flex !important;
        }
        #menu-overlay,
        #gameover-overlay,
        #victory-overlay,
        #revive-overlay,
        #rotate-device-overlay {
            display: none !important;
        }
        .choices-grid {
            display: grid !important;
            width: 100%;
            max-width: min(960px, 100%);
        }
        .preview-mode-tag {
            position: absolute;
            top: 10px;
            right: 70px;
            z-index: 19;
            font-size: 12px;
            color: #ffd700;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,215,0,0.35);
            padding: 4px 10px;
            border-radius: 999px;
            pointer-events: none;
            font-family: var(--font-body);
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container">
            <div class="preview-world" aria-hidden="true">
                <div class="layer layer-sky" id="pv-sky" style="background-image:url('../assets/images/backgrounds/bg_sky_Morning.png')"></div>
                <div class="layer layer-islands" style="background-image:url('../assets/images/backgrounds/bg_islands.png')"></div>
                <div class="layer layer-deck" id="pv-deck" style="background-image:url('../assets/images/backgrounds/bg_deck_Math.png')"></div>
                <div class="preview-hp player-hp"><span></span></div>
                <div class="preview-hp monster-hp"><span></span></div>
                <div class="preview-actor player"></div>
                <div class="preview-actor monster" id="pv-monster"></div>
            </div>

            <div class="preview-wave" id="pv-wave">วิชา: คณิตศาสตร์ · คำถามที่: 1/30</div>
            <div class="preview-mode-tag">พรีวิว = หน้าตาจริงในเกม</div>

            <div id="ui-overlay">
                <div id="top-hud" class="hud-layer">
                    <div class="inventory">
                        <button type="button" class="btn btn-item" disabled title="กล้องส่องทางไกล">
                            <div class="item-icon-wrapper">
                                <svg class="item-icon" viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="2"><path d="M18.5 5.5L13.5 10.5M10.5 7.5L5.5 12.5M15.5 2.5L21.5 8.5M3 21l3-3M3 17l4 4"/><circle cx="17" cy="7" r="3"/></svg>
                                <span class="item-count-badge">2</span>
                            </div>
                            <div class="item-info">
                                <span class="item-name">กล้องส่องทางไกล</span>
                                <span class="item-desc">ตัดตัวเลือกที่ผิด 2 ข้อ</span>
                            </div>
                        </button>
                        <button type="button" class="btn btn-item" disabled title="กล่องพยาบาล">
                            <div class="item-icon-wrapper">
                                <svg class="item-icon" viewBox="0 0 24 24" fill="none" stroke="#4cd964" stroke-width="2"><rect x="3" y="9" width="18" height="12" rx="2"/><path d="M7 9V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v4"/><path d="M12 12v6M9 15h6"/></svg>
                                <span class="item-count-badge">2</span>
                            </div>
                            <div class="item-info">
                                <span class="item-name">กล่องพยาบาล</span>
                                <span class="item-desc">ฟื้นฟูพลังชีวิต +30 HP</span>
                            </div>
                        </button>
                        <button type="button" class="btn btn-item" disabled title="กระสุนปืนใหญ่">
                            <div class="item-icon-wrapper">
                                <svg class="item-icon" viewBox="0 0 24 24" fill="none" stroke="#ffd700" stroke-width="2"><circle cx="11" cy="13" r="7"/><path d="M16.5 7.5L19 5M19 5h3M19 5V2"/></svg>
                                <span class="item-count-badge">1</span>
                            </div>
                            <div class="item-info">
                                <span class="item-name">กระสุนปืนใหญ่</span>
                                <span class="item-desc">ความเสียหาย 2 เท่าในเทิร์นถัดไป</span>
                            </div>
                        </button>
                    </div>
                    <button type="button" class="btn btn-mute" disabled title="เสียง">
                        <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="#ffd700" stroke-width="2">
                            <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                        </svg>
                    </button>
                </div>

                <div id="quiz-panel" class="hud-layer">
                    <div id="double-damage-badge" class="badge hidden">ใช้งานความเสียหาย 2 เท่า!</div>
                    <div class="quiz-box">
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;width:100%;gap:10px;flex-wrap:wrap;">
                            <button type="button" id="btn-open-scenario" class="btn btn-scenario-trigger hidden" onclick="openScenario()">📜 อ่านสถานการณ์</button>
                            <div id="question-img-container" class="question-media hidden" style="margin-bottom:0;">
                                <button type="button" id="btn-toggle-img" class="btn btn-secondary btn-toggle-img" onclick="toggleImg()" style="margin:0;padding:4px 10px;font-size:14px;">🖼️ แสดงภาพประกอบ</button>
                                <img id="question-img" class="question-img hidden" src="" alt="โจทย์">
                            </div>
                        </div>
                        <h2 id="question-text">กำลังโหลด...</h2>
                    </div>
                    <div class="choices-grid" id="choices-grid">
                        <button type="button" id="choice-0" class="btn btn-choice">ตัวเลือก ก</button>
                        <button type="button" id="choice-1" class="btn btn-choice">ตัวเลือก ข</button>
                        <button type="button" id="choice-2" class="btn btn-choice">ตัวเลือก ค</button>
                        <button type="button" id="choice-3" class="btn btn-choice">ตัวเลือก ง</button>
                    </div>
                </div>

                <div id="scenario-overlay" class="overlay-panel scenario-overlay-panel hidden" onclick="onBackdrop(event)">
                    <div class="parchment-scroll" onclick="event.stopPropagation()">
                        <button type="button" class="btn-close-scroll" onclick="closeScenario()" aria-label="ปิด">✕</button>
                        <div id="scroll-content" class="scroll-content"></div>
                        <div class="scenario-footer-actions">
                            <button type="button" class="btn btn-primary btn-close-scenario-main" onclick="closeScenario()">ปิดและไปตอบคำถาม</button>
                            <label class="scenario-auto-toggle">
                                <input type="checkbox" checked disabled>
                                <span>เปิดสถานการณ์อัตโนมัติเมื่อเจอเรื่องใหม่</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentScenario = "";
        const MONSTERS = {
            math: "../assets/images/characters/Monster_Set1/Easy/standard/idle/left/1.png",
            science: "../assets/images/characters/Monster_Set2/easy/standard/idle/left/1.png",
            thai: "../assets/images/characters/Monster_Set3/easy/standard/idle/left/1.png",
            exam: "../assets/images/characters/Monster_Set1/Easy/standard/idle/left/1.png"
        };
        const DECKS = {
            math: "bg_deck_Math.png",
            science: "bg_deck_Sci.png",
            thai: "bg_deck_Thailang.png",
            exam: "bg_deck_Math.png"
        };
        const SUBJECT_TH = {
            math: "คณิตศาสตร์",
            science: "วิทยาศาสตร์",
            thai: "ภาษาไทย",
            exam: "สอบรวม"
        };

        function formatHtml(raw) {
            return String(raw || "").replace(/>\s+</g, "><").replace(/\n/g, "<br>");
        }

        function renderMath(el) {
            if (!el || !window.renderMathInElement) return;
            try {
                renderMathInElement(el, {
                    delims: [
                        { left: "$$", right: "$$", display: true },
                        { left: "$", right: "$", display: false }
                    ]
                });
            } catch (e) { /* ignore */ }
        }

        function openScenario() {
            const overlay = document.getElementById("scenario-overlay");
            const content = document.getElementById("scroll-content");
            if (!overlay || !content) return;
            if (!currentScenario || !String(currentScenario).trim()) return;
            content.innerHTML = formatHtml(currentScenario);
            overlay.classList.remove("hidden");
            renderMath(content);
        }

        function closeScenario() {
            const overlay = document.getElementById("scenario-overlay");
            if (overlay) overlay.classList.add("hidden");
        }

        function onBackdrop(e) {
            if (e.target && e.target.id === "scenario-overlay") closeScenario();
        }

        function toggleImg() {
            const img = document.getElementById("question-img");
            const btn = document.getElementById("btn-toggle-img");
            if (!img || !btn) return;
            const hide = img.classList.toggle("hidden");
            btn.innerText = hide ? "🖼️ แสดงภาพประกอบ" : "🖼️ ซ่อนภาพประกอบ";
        }

        function applyPreview(data) {
            if (!data) return;
            const subject = data.subject || "math";
            const scene = (data.scene || "morning").toLowerCase();

            // Backdrop
            let sky = "bg_sky_Morning.png";
            if (scene === "evening" || scene === "เย็น") sky = "bg_sky_Evening.png";
            else if (scene === "night" || scene === "กลางคืน" || scene === "ค่ำ") sky = "bg_sky_night.png";
            const skyEl = document.getElementById("pv-sky");
            const deckEl = document.getElementById("pv-deck");
            const monEl = document.getElementById("pv-monster");
            if (skyEl) skyEl.style.backgroundImage = `url('../assets/images/backgrounds/${sky}')`;
            if (deckEl) deckEl.style.backgroundImage = `url('../assets/images/backgrounds/${DECKS[subject] || DECKS.math}')`;
            if (monEl) monEl.style.backgroundImage = `url('${MONSTERS[subject] || MONSTERS.math}')`;

            const wave = document.getElementById("pv-wave");
            if (wave) {
                const n = data.index != null ? data.index + 1 : 1;
                const t = data.total || "?";
                wave.textContent = `วิชา: ${SUBJECT_TH[subject] || subject} · คำถามที่: ${n}/${t}`;
            }

            // Scenario
            currentScenario = data.scenario || "";
            const btnSc = document.getElementById("btn-open-scenario");
            if (btnSc) {
                if (currentScenario.trim()) btnSc.classList.remove("hidden");
                else btnSc.classList.add("hidden");
            }
            if (data.forceOpenScenario && currentScenario.trim()) {
                openScenario();
            } else if (!data.keepScenarioOpen) {
                closeScenario();
            }

            // Image
            const imgBox = document.getElementById("question-img-container");
            const imgEl = document.getElementById("question-img");
            const btnImg = document.getElementById("btn-toggle-img");
            const hasInlineImg = /<img\s/i.test(data.question || "");
            if (imgBox && imgEl) {
                if (data.img && String(data.img).trim() && !hasInlineImg) {
                    imgEl.src = data.img;
                    const showNow = data.showImg === true || data.showImg === "true";
                    if (showNow) {
                        imgEl.classList.remove("hidden");
                        imgBox.classList.remove("hidden");
                        if (btnImg) btnImg.classList.add("hidden");
                    } else {
                        imgEl.classList.add("hidden");
                        imgBox.classList.remove("hidden");
                        if (btnImg) {
                            btnImg.classList.remove("hidden");
                            btnImg.innerText = "🖼️ แสดงภาพประกอบ";
                        }
                    }
                } else {
                    imgBox.classList.add("hidden");
                    imgEl.src = "";
                }
            }

            // Question text
            const qEl = document.getElementById("question-text");
            if (qEl) {
                const q = data.question || "";
                qEl.innerHTML = q
                    ? formatHtml(q)
                    : '<span style="color:#8a92a5">(ยังไม่มีข้อความโจทย์)</span>';
                renderMath(qEl);
            }

            // Choices + layout flags (match game.js rules)
            const grid = document.getElementById("choices-grid");
            const panel = document.getElementById("quiz-panel");
            let isLongChoice = false;
            const choices = data.choices || ["", "", "", ""];
            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById(`choice-${i}`);
                if (!btn) continue;
                const html = choices[i] || "";
                btn.innerHTML = html;
                btn.classList.toggle("correct", i === data.answerIndex);
                btn.classList.remove("wrong");
                const plainLen = String(html).replace(/<[^>]+>/g, "").length;
                if (plainLen > 35 || /<br\s*\/?>/i.test(html) || /<table/i.test(html) || /<img/i.test(html)) {
                    isLongChoice = true;
                }
            }
            if (grid) {
                grid.classList.toggle("long-choices", isLongChoice);
                // ensure grid is visible
                grid.style.display = "grid";
            }
            if (panel) {
                panel.classList.remove("hidden");
                panel.classList.toggle("has-long-choices", isLongChoice);
                const q = data.question || "";
                // Match game.js split rule
                const longQ = q.length > 250 || (q.match(/<img/g) || []).length >= 1;
                panel.classList.toggle("split-layout", longQ);
                // Restore flex direction after class toggle
                if (longQ) {
                    panel.style.display = "flex";
                    panel.style.flexDirection = "row";
                } else {
                    panel.style.display = "flex";
                    panel.style.flexDirection = "column";
                }
                panel.scrollTop = 0;
            }

            for (let i = 0; i < 4; i++) {
                const b = document.getElementById(`choice-${i}`);
                if (b) {
                    b.classList.remove("hidden");
                    b.style.visibility = "visible";
                    renderMath(b);
                }
            }

            // Mode: scenarios-only editor
            if (data.mode === "scenarios") {
                if (qEl) {
                    qEl.innerHTML = currentScenario.trim()
                        ? '<span style="color:#ffd700">กำลังแก้ไขสถานการณ์ — กด “อ่านสถานการณ์” เพื่อดูแบบเต็มจอเหมือนในเกม</span>'
                        : '<span style="color:#8a92a5">ยังไม่มีสถานการณ์</span>';
                }
                for (let i = 0; i < 4; i++) {
                    const b = document.getElementById(`choice-${i}`);
                    if (b) b.innerHTML = "—";
                }
            }
        }

        window.addEventListener("message", (e) => {
            if (!e.data || e.data.type !== "admin-preview-update") return;
            applyPreview(e.data.payload || {});
        });

        // Ready handshake for parent (retry so late listeners still get content)
        function notifyReady() {
            try {
                window.parent && window.parent.postMessage({ type: "admin-preview-ready" }, "*");
            } catch (e) { /* ignore */ }
        }
        document.documentElement.style.fontSize = "16px";
        if (document.readyState === "complete") notifyReady();
        else window.addEventListener("load", notifyReady);
        // KaTeX deferred — push ready again when available
        setTimeout(notifyReady, 400);
        setTimeout(notifyReady, 1200);
    </script>
</body>
</html>
